name: Perpetual Node Relay

on:
  repository_dispatch:
    types: [update-relay]
  workflow_dispatch:

jobs:
  relay:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Dependencies
        run: npm install

      - name: Start Server in Background
        run: node server.js &
        env:
          PORT: 8080

      - name: Relay Pacing
        run: |
          echo "Process started at $(date)"
          # We wait for 5 hours and 30 minutes (19800 seconds)
          # This leaves 30 minutes for the handoff to occur
          sleep 19800
          echo "Tagging the next runner..."

      - name: Trigger Successor
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: |
          curl -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer $GH_TOKEN" \
            https://api.github.com/repos/${{ github.repository }}/dispatches \
            -d '{"event_type": "update-relay"}'
          
          echo "Successor triggered at $(date). Shutting down current process..."
          # Give a small buffer for the successor to start before this one dies
          sleep 60
