name: Perpetual Node Relay (WA Bot)

on:
  repository_dispatch:
    types: [update-relay]
  workflow_dispatch:

jobs:
  relay:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Dependencies
        run: npm install

      - name: Check Environment
        run: node test-env.js
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}

      - name: Start WhatsApp Bot
        run: node server.js &
        env:
          PORT: 8080
          GH_TOKEN: ${{ secrets.GH_TOKEN }}

      - name: Relay Pacing (5.5 Hours)
        run: |
          echo "Bot started at $(date)"
          sleep 19800
          echo "Handoff sequence initiated..."

      - name: Save Session & Trigger Successor
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # Stage the auth folder and any state changes
          git add auth_info_baileys/ state.json || true
          git commit -m "Sync WA session data before handoff" || echo "No session changes to commit"
          git push origin main || echo "Push failed (potential conflict), proceeding with trigger"

          # Trigger the relay
          curl -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer $GH_TOKEN" \
            https://api.github.com/repos/${{ github.repository }}/dispatches \
            -d '{"event_type": "update-relay"}'
          
          echo "Successor triggered. Final sleep (1m) for graceful transition..."
          sleep 60
